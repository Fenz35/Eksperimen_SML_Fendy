name: Data Preprocessing Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  preprocess:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    # Checks-out your repository under $GITHUB_WORKSPACE
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Python 3.12.7
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn joblib

    - name: Run preprocessing script
      run: |
        python preprocessing/automate_Fendy.py

    - name: Commit and Push processed data
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated: Update processed dataset and preprocessor joblib"
        file_pattern: 'preprocessing/GAP_preprocessing/*'
